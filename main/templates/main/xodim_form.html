{% extends 'base.html' %}

{% block title %}Xodim Qo'shish{% endblock %}

{% block content %}
<div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">👥 Xodim Qo'shish</h2>
    <p class="text-sm text-gray-600">Yangi xodim qo'shish</p>
</div>

<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-5 border-b border-gray-100 bg-gradient-to-r from-[#2001FF] to-[#5A4AFF]">
            <h3 class="text-lg font-semibold text-white flex items-center gap-2">
                <i class="ri-user-add-line"></i>
                Xodim ma'lumotlari
            </h3>
        </div>
        
        <div class="p-6">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <!-- Ism -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="ri-user-line text-[#2001FF] mr-1"></i>
                        Ism
                    </label>
                    <input type="text" name="ism" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2001FF] focus:border-transparent" required>
                </div>
                
                <!-- Familya -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="ri-user-line text-[#2001FF] mr-1"></i>
                        Familya
                    </label>
                    <input type="text" name="familya" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2001FF] focus:border-transparent" required>
                </div>
                
                <!-- Telefon -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="ri-phone-line text-[#2001FF] mr-1"></i>
                        Telefon
                    </label>
                    <input type="tel" name="telefon" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2001FF] focus:border-transparent" placeholder="+998 90 123 45 67" required>
                </div>
                
                <!-- Username -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="ri-user-settings-line text-[#2001FF] mr-1"></i>
                        Login (username)
                    </label>
                    <input type="text" name="username" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2001FF] focus:border-transparent" required>
                </div>
                
                <!-- Parol -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="ri-lock-line text-[#2001FF] mr-1"></i>
                        Parol
                    </label>
                    <input type="password" name="password" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-[#2001FF] focus:border-transparent" required>
                </div>
                
                <!-- Rasm -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="ri-image-line text-[#2001FF] mr-1"></i>
                        Rasm (ixtiyoriy)
                    </label>
                    <input type="file" name="rasm" accept="image/*" class="w-full p-2 border border-gray-200 rounded-xl">
                    <p class="text-xs text-gray-400 mt-1">PNG, JPG, GIF (5MB gacha)</p>
                </div>
                
                <!-- Tugmalar -->
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 px-4 py-3 bg-gradient-to-r from-[#2001FF] to-[#5A4AFF] text-white rounded-xl hover:shadow-lg transition-all font-medium flex items-center justify-center gap-2">
                        <i class="ri-check-line"></i>
                        Xodim qo'shish
                    </button>
                    <a href="{% url 'xodimlar' %}" class="px-4 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors flex items-center justify-center">
                        <i class="ri-close-line text-xl"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
